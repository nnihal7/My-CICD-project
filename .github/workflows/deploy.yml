name: CI/CD Pipeline

on:
  push:
    branches: [master]

jobs:
  test:
    name: Test Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ -d ~/my-cicd-project ]; then
              cd ~/my-cicd-project && git pull origin master
            else
              git clone https://github.com/nnihal7/My-CICD-project.git ~/my-cicd-project
              cd ~/my-cicd-project
            fi
            docker build -t my-cicd-app .
            docker stop my-cicd-app || true
            docker rm my-cicd-app || true
            docker run -d --name my-cicd-app -p 3000:3000 my-cicd-app
